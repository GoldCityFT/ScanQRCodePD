function isValidProvinceExact(text){
  const v = normalizeThai(text);
  return PROVINCES.includes(v);
}

function renderProvinceDropdown(keyword = ""){
  const q = normalizeThai(keyword);
  let items = PROVINCES;

  if(q){
    items = PROVINCES.filter(p => p.includes(q));
  }

  if(items.length === 0){
    provinceDropdown.innerHTML = `<div class="provinceItem">ไม่พบจังหวัด</div>`;
    provinceDropdown.style.display = "block";
    return;
  }

  provinceDropdown.innerHTML = items
    .slice(0, 77)
    .map(p => `<div class="provinceItem" data-value="${p}">${p}</div>`)
    .join("");

  provinceDropdown.style.display = "block";
}

function hideProvinceDropdown(){
  provinceDropdown.style.display = "none";
}

function setupSingleChoiceDropdown(inputId, dropdownId, options, allowCustom = false){
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);

  function render(keyword = ""){
    const q = normalizeThai(keyword);
    let items = options;

    if(q){
      items = options.filter(item => item.includes(q));
    }

    if(items.length === 0){
      if(allowCustom && q){
        dropdown.innerHTML = `<div class="choiceItem" data-value="${q}">ใช้ค่า: ${q}</div>`;
      }else{
        dropdown.innerHTML = `<div class="choiceItem">ไม่พบรายการ</div>`;
      }
      dropdown.style.display = "block";
      return;
    }

    dropdown.innerHTML = items
      .map(item => `<div class="choiceItem" data-value="${item}">${item}</div>`)
      .join("");

    dropdown.style.display = "block";
  }

  function hide(){
    dropdown.style.display = "none";
  }

  input.addEventListener("focus", () => {
    // เปิดมาให้เห็นตัวเลือกทั้งหมด เพื่อเลือกใหม่ทับค่าเดิมได้ทันที
    render("");

    setTimeout(()=>{
      input.scrollIntoView({
        block:"center",
        behavior:"smooth"
      });
    },200);
  });

  input.addEventListener("click", () => {
    // กดซ้ำก็เปิดตัวเลือกทั้งหมด
    render("");
  });

  input.addEventListener("input", () => {
    input.value = normalizeThai(input.value);
    render(input.value);
  });

  dropdown.addEventListener("click", (e) => {
    const item = e.target.closest(".choiceItem");
    if(!item) return;

    const value = item.dataset.value;
    if(!value) return;

    // เลือกใหม่แล้วทับค่าเดิมทันที
    input.value = value;
    hide();

    input.blur();
    document.activeElement?.blur?.();
  });

  document.addEventListener("click", (e) => {
    if(!e.target.closest(`[data-choice-wrap="${inputId}"]`)){
      hide();
    }
  });
}

function setupMultiChoiceDropdown(inputId, dropdownId, options, maxSelect = 2){
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  let selected = [];

  function render(){
    dropdown.innerHTML = options
      .map(item => {
        const isSelected = selected.includes(item);
        return `<div class="choiceItem ${isSelected ? "selected" : ""}" data-value="${item}">
          ${isSelected ? "✓ " : ""}${item}
        </div>`;
      })
      .join("");

    dropdown.style.display = "block";
  }

  function syncInput(){
    input.value = selected.join(", ");
  }

  input.addEventListener("focus", () => {
    render();

    setTimeout(()=>{
      input.scrollIntoView({
        block:"center",
        behavior:"smooth"
      });
    },200);
  });

  input.addEventListener("click", () => {
    render();
  });

  dropdown.addEventListener("click", (e) => {
    const item = e.target.closest(".choiceItem");
    if(!item) return;

    const value = item.dataset.value;
    if(!value) return;

    if(selected.includes(value)){
      selected = selected.filter(x => x !== value);
    }else{
      if(selected.length >= maxSelect){
        showModal(`เลือกได้ไม่เกิน ${maxSelect} ข้อ`, null, "OK");
        return;
      }
      selected.push(value);
    }

    syncInput();
    render();
  });

  document.addEventListener("click", (e) => {
    if(!e.target.closest(`[data-choice-wrap="${inputId}"]`)){
      dropdown.style.display = "none";
    }
  });
}

    sessionStorage.setItem("idt", idToken);
    sessionStorage.setItem("disname", profile.displayName || "");

    // กันหลุด (จริง ๆ บังคับใน ScanQrcode3 แล้ว แต่กันเหนียว)
    if(!trackingCode){
      showModal("❌ ไม่พบข้อมูลรหัสพัสดุ กรุณากลับไปสแกน/กรอกก่อน", () => {
        window.location.href = "ScanQrcode3.html";
      }, "ตกลง");
      return;
    }
  }catch(err){
    console.error(err);
    showModal("เกิดข้อผิดพลาดในการโหลดหน้า โปรดลองใหม่อีกครั้ง", null, "OK");
    return;
  }finally{
    loadingModal.style.display = "none";
    form.style.display = "block";
  }
}

function focusProvince(){
  const el = document.getElementById("Province");
  // หน่วงนิดนึงกัน iOS/LIFF ไม่ยอมโฟกัสทันทีหลังปิด modal
  setTimeout(() => {
    el.focus();
    // select มีบางเครื่องไม่รองรับหรือไม่ทำงาน ก็ไม่เป็นไร
    if (typeof el.select === "function") el.select();
  }, 120);
}

function focusInput(id){
  const el = document.getElementById(id);
  setTimeout(() => {
    el.focus();
    if (typeof el.select === "function") el.select();
  }, 120);
}

/* เปิด popup ยืนยันข้อมูล */
function escapeHtml(s){
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
function openConfirm(data){
  confirmProvince.textContent = data.province;

  confirmDetail.innerHTML = `
    <div><b>เพศ:</b> ${escapeHtml(data.gender)}</div>
    <div><b>อายุ:</b> ${escapeHtml(data.age)}</div>
    <div><b>ขนาดรองเท้า:</b> ${escapeHtml(data.shoeSize)}</div>
    <div><b>ปัจจัยสำคัญ:</b> ${escapeHtml(data.psychology1)}</div>
    <div><b>วันหยุด:</b> ${escapeHtml(data.psychology2)}</div>
    <div><b>แคมเปญที่สนใจ:</b> ${escapeHtml(data.psychology3)}</div>
  `;

  confirmModal.style.display = "flex";
}

function closeConfirm(){
  confirmModal.style.display = "none";
}

const POST_URL = "https://script.google.com/macros/s/AKfycbyI4L5rtLMwDLNvgvqXuReLS0aBF6kk6wD7mxMRiUTzyq5Ej26O8StNx5-CUR75Pjd_/exec";

let beaconSent = false;

function buildDraftBody(){
  const uid = sessionStorage.getItem("uid") || document.getElementById("UserId").value || "";
  const idt = sessionStorage.getItem("idt") || document.getElementById("IdToken").value || "";
  const name =
  sessionStorage.getItem("disname") ||
  document.getElementById("Name").value ||
  "";
  
  const tracking = (document.getElementById("Tracking").value || "").trim();
  const location = normalizeThai(document.getElementById("Province").value);
  
  const gender = normalizeThai(document.getElementById("Gender").value);
  const age = normalizeThai(document.getElementById("Age").value);
  const shoeSize = normalizeThai(document.getElementById("ShoeSize").value);
  const psychology1 = normalizeThai(document.getElementById("Psychology1").value);
  const psychology2 = normalizeThai(document.getElementById("Psychology2").value);
  const psychology3 = normalizeThai(document.getElementById("Psychology3").value);

  const body = new URLSearchParams();
  body.set("UserId", uid);
  body.set("IdToken", idt);
  body.set("Name_Member", name);
  body.set("Tracking", tracking);
  body.set("Location", location);

  body.set("Gender_Member", gender);
  body.set("Age_Member", age);
  body.set("ShoeSize_Member", shoeSize);
  body.set("Psychology1_Member", psychology1);
  body.set("Psychology2_Member", psychology2);
  body.set("Psychology3_Member", psychology3);

  return body; 
}

function sendDraftOnce(){
  if (isSubmitted) return;
  if (beaconSent) return;

  const body = buildDraftBody();
  
  beaconSent = true;
  const ok = navigator.sendBeacon(POST_URL, body);
  console.log("sendBeacon ok?", ok, Object.fromEntries(body.entries()));
}

window.addEventListener("pagehide", sendDraftOnce);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") sendDraftOnce();
});
